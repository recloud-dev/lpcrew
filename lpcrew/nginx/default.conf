upstream lpcrew_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Размер загружаемых файлов (изображения в Wagtail, документы)
    client_max_body_size 50M;

    # Статика — собрана collectstatic в общий volume
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Медиа — загрузки пользователей/редакторов
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://lpcrew_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Django читает реальную схему отсюда (см. SECURE_PROXY_SSL_HEADER)
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
