services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lpcrew
      POSTGRES_USER: lpcrew
      POSTGRES_PASSWORD: lpcrew
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lpcrew"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: lpcrew.settings.dev
      DATABASE_URL: postgres://lpcrew:lpcrew@db:5432/lpcrew
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin12345
      DJANGO_SUPERUSER_EMAIL: admin@example.com
    volumes:
      - .:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media:
